services:
  db:
    image: postgres:16-alpine
    container_name: finapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finapp
      POSTGRES_USER: finapp_user
      POSTGRES_PASSWORD: finapp_dev_password
    ports:
      - "5433:5432"
    volumes:
      - finapp_db_data:/var/lib/postgresql/data

volumes:
  finapp_db_data:
